<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NUMO VENTURES</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  color:#fff;
  background:
  linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.9)),
  url("bg-premium.jpg") center/cover no-repeat fixed;
}

/* CONTAINER */
.container{
  width:95%;
  max-width:500px;
  margin:auto;
}

/* SECTION BOX */
.box{
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(15px);
  border-radius:18px;
  padding:15px;
  margin:15px 0;
  border:1px solid rgba(255,255,255,0.08);
}

/* TITLE */
h1{
  text-align:center;
  margin:15px 0;
  font-size:28px;
  font-weight:800;
}

/* TESTIMONI */
.testimoni-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.testimoni{
  background:rgba(0,0,0,0.6);
  border-radius:12px;
  overflow:hidden;
}

.testimoni img{
  width:100%;
  height:auto;
  display:block;
}

.testimoni p{
  text-align:center;
  font-size:12px;
  padding:6px;
}

/* GUARANTEE */
.guarantee{
  text-align:center;
  font-weight:700;
  margin-top:10px;
  color:#4ce3ff;
}

/* PRODUCT */
.product-title{
  font-weight:800;
  font-size:18px;
  margin-bottom:10px;
}

.plan{
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  cursor:pointer;
}

.plan.active{
  border:1px solid #4ce3ff;
}

.price{
  color:#6dffb0;
  font-weight:700;
}

/* BUTTON */
.order-btn{
  display:none;
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#11b8ff,#297dff);
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

.order-btn.show{
  display:block;
}
</style>
</head>

<body>

<div class="container">

<h1>NUMO VENTURES</h1>

<!-- TESTIMONI -->
<div class="box">
<h2>Testimoni</h2>
<div id="testimoni" class="testimoni-grid"></div>

<div class="guarantee">Gerenti tak menyesal!</div>
</div>

<!-- PRODUK -->
<div id="products"></div>

</div>

<script src="app.js"></script>
</body>
</html>
