<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUMO VENTURES</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Poppins',sans-serif;
color:#eef8ff;
background:
linear-gradient(rgba(2,8,20,0.75),rgba(2,8,20,0.9)),
url("bg-premium.jpg") center/cover no-repeat fixed;
}

/* HERO */
.hero{padding:20px;text-align:center;}

.logo{width:100px;margin:auto;}

.site-title{font-size:30px;font-weight:800;}

.tagline{
font-family:'Caveat';
font-size:28px;
color:#4ce3ff;
}

/* SECTION */
.section{width:95%;max-width:400px;margin:auto;}

/* TESTIMONI */
.testimoni-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.testimoni-card img{
width:100%;
height:auto;
border-radius:10px;
}

/* PRODUCT */
.box{
background:linear-gradient(#0f1c3a,#07122a);
padding:15px;
border-radius:15px;
margin:15px 0;
}

.plan{
background:rgba(255,255,255,0.05);
padding:12px;
border-radius:10px;
margin-top:8px;
cursor:pointer;
}

.plan.active{
border:1px solid #4ce3ff;
}

.price{
color:#6dffb0;
font-weight:bold;
}

/* BUTTON */
.btn-order{
display:block;
margin-top:10px;
padding:12px;
background:linear-gradient(90deg,#11b8ff,#297dff);
border-radius:10px;
text-align:center;
text-decoration:none;
color:white;
font-weight:bold;
}
</style>
</head>

<body>

<div class="hero">
<img src="Numologo.jpg" class="logo">
<h1 class="site-title">AKAUN PREMIUM MURAH</h1>
<p class="tagline">kami janji tak sidai</p>
</div>

<div class="section">

<!-- TESTIMONI ATAS -->
<h2>Testimoni</h2>
<div id="testimoni" class="testimoni-grid"></div>

<h2>Senarai Produk</h2>
<div id="products"></div>

</div>

<script src="app.js"></script>
</body>
</html>
