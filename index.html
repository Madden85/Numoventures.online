<!DOCTYPE html>
<html>
<head>
<title>NUMO VENTURES</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0a0f1f;
    color:white;
    text-align:center;
}

.container {
    width:95%;
    max-width:400px;
    margin:auto;
}

/* BOX */
.box {
    background:linear-gradient(180deg,#0f1c3a,#07122a);
    border-radius:20px;
    padding:15px;
    margin:15px 0;
}

/* PLAN */
.plan {
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    padding:15px;
    margin-bottom:10px;
    cursor:pointer;
}

.plan.active {
    border:2px solid #00d4ff;
}

/* PRICE */
.price {
    color:#00ff9d;
    font-size:20px;
    font-weight:bold;
}

/* BUTTON */
.order-btn {
    display:none;
    width:100%;
    padding:15px;
    border:none;
    border-radius:20px;
    background:linear-gradient(90deg,#2bc0ff,#297dff);
    color:white;
    font-size:18px;
    margin-top:10px;
}

.order-btn.show {
    display:block;
}

/* TESTIMONI */
.testimoni-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.testimoni img {
    width:100%;
    height:auto;
    border-radius:10px;
}

/* GUARANTEE */
.guarantee {
    margin-top:10px;
    font-weight:bold;
    color:#00d4ff;
}
</style>
</head>

<body>

<div class="container">

<h2>NUMO VENTURES</h2>

<!-- TESTIMONI -->
<div class="box">
<h3>Testimoni</h3>
<div id="testimoni" class="testimoni-grid"></div>

<div class="guarantee">Gerenti tak menyesal!</div>
</div>

<!-- PRODUK -->
<div id="products"></div>

</div>

<script src="app.js"></script>

</body>
</html>
